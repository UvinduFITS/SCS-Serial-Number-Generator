name: React Verified CI/CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ─── DEBUG: Verify secrets are set and the hostname resolves ───
      - name: Debug FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "── Secret length check (values are masked) ──"
          echo "FTP_SERVER   length: ${#FTP_SERVER}"
          echo "FTP_USERNAME length: ${#FTP_USERNAME}"
          echo "FTP_PASSWORD length: ${#FTP_PASSWORD}"
          echo ""
          echo "── Character codes of FTP_SERVER (detects hidden chars) ──"
          echo -n "$FTP_SERVER" | od -c | head -3
          echo ""
          echo "── DNS resolution test ──"
          nslookup "$FTP_SERVER" || echo "DNS LOOKUP FAILED — hostname value is invalid"
          echo ""
          echo "── TCP connection test on port 21 ──"
          timeout 10 bash -c "cat < /dev/tcp/$FTP_SERVER/21" && echo "TCP connect OK" || echo "TCP connect FAILED"

      - name: Deploy to Namecheap via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          security: loose
          local-dir: ./dist/
          server-dir: /public_html/scsoperations/
          dangerous-clean-slate: false
          log-level: verbose
